[workspace]
resolver = "2"
members = [
    "crates/sentinel-domain",
    "crates/sentinel-application",
    "crates/sentinel-infrastructure",
    "crates/sentinel-cli",
    "crates/sentinel-mcp",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Gary Somerhalder"]
license = "MIT"
repository = "https://github.com/garysomerhalder/sentinel"
rust-version = "1.83"

[workspace.dependencies]
# Internal crates
sentinel-domain = { path = "crates/sentinel-domain" }
sentinel-application = { path = "crates/sentinel-application" }
sentinel-infrastructure = { path = "crates/sentinel-infrastructure" }

# Async runtime
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"
futures = "0.3"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"

# Error handling
anyhow = "1"
thiserror = "2"

# Crypto
sha2 = "0.10"
hmac = "0.12"
chacha20poly1305 = "0.10"

# HTTP client (Anthropic API)
reqwest = { version = "0.12", features = ["json", "rustls-tls"] }

# LLM framework (multi-model AI judge — Cerebras, OpenAI, Anthropic)
rig-core = { version = "0.30", package = "rig-core" }

# HTTP server (dashboard API)
axum = { version = "0.8", features = ["ws"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace"] }

# CLI
clap = { version = "4", features = ["derive", "env", "wrap_help"] }

# Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Data
chrono = { version = "0.4", features = ["serde"] }
dirs = "6"
regex = "1"
petgraph = "0.6"
uuid = { version = "1", features = ["v4", "serde"] }
colored = "3"
glob = "0.3"
fs2 = "0.4"
getrandom = "0.2"

# Dev
tempfile = "3"

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
# Allow common patterns
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
panic = "abort"
