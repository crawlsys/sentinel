name: Build and Push

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/crawlsys/sentinel:latest
            ghcr.io/crawlsys/sentinel:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homelab
        uses: actions/checkout@v4
        with:
          repository: crawlsys/homelab
          token: ${{ secrets.HOMELAB_TOKEN }}
          ref: master
          path: homelab

      - name: Update homelab image tag
        run: |
          cd homelab
          sed -i 's/  tag: ".*"/  tag: "${{ github.sha }}"/' argo/charts/sentinel/values.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add argo/charts/sentinel/values.yaml
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "deploy: sentinel ${{ github.sha }}"
          git push
