name: Build and Push

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/kvncrw/sentinel:latest
            ghcr.io/kvncrw/sentinel:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PEM }}
          owner: kvncrw
          repositories: homelab

      - name: Update image tag in homelab
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/kvncrw/homelab.git /tmp/homelab
          cd /tmp/homelab
          sed -i "s|^  tag:.*|  tag: \"${GITHUB_SHA}\"|" argo/charts/sentinel/values.yaml
          git config user.name "cc-claude-bot[bot]"
          git config user.email "cc-claude-bot[bot]@users.noreply.github.com"
          git add argo/charts/sentinel/values.yaml
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore(sentinel): update image tag to ${GITHUB_SHA::8}"
          git push
