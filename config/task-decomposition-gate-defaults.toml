# Task Decomposition Gate — shipped defaults.
#
# Operator override: ~/.claude/sentinel/config/task-decomposition-gate.toml
# (wholesale replacement, same schema — mirrors tool-usage-gate.toml).
#
# enabled — master switch for the whole gate. Set to false to disable it
# entirely (mutating tools are never blocked for a missing task list and no
# graph authority is consulted). Intended for controlled environments — e.g.
# benchmark arms that measure Claude Code without this gate — NOT for
# day-to-day operation. A missing key or an unparseable file falls back to
# `true` (fail closed to enforcement).
enabled = true
