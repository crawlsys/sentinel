# Without these, the conservative unknown-MCP default (Irreversible) strands
# every memory tool at the A3 dry-run gate (the _intent/_reasoning/_expected_effect
# fields can't be passed through the MCP tool schema — unbreakable deadlock,
# same class as the PowerShell + sequential-thinking fixes).
