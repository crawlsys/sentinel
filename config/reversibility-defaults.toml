# Sentinel reversibility classification — shipped defaults.
#
# Read by `sentinel_infrastructure::reversibility::LayeredReversibilityClassifier`
# at sentinel startup. Operators add per-workflow refinements in a sibling
# `config/reversibility.toml` (Layer 4 overrides); the loader merges the two
# files per the rules in the adapter's module docstring.
#
# Per the A6 design (`docs/a6-reversibility-graded-tripwires.md`), every
# blast-radius gate in sentinel consults the resulting class. Conservative
# defaults are load-bearing: unknown MCP server/tool falls back to
# Irreversible; unmatched Bash command falls back to ReversibleWithEffort.
# These TOML entries make those fallbacks more specific.
#
# Editing this file is OK; the schema is the same as operator overrides.
# Tests in `sentinel-infrastructure/src/reversibility.rs` exercise the
# shipped contents via `include_str!` — TOML edits that break the schema
# or change a smoke-test-asserted classification will fail CI.
#
# Class values: TriviallyReversible | ReversibleWithEffort | Irreversible | Catastrophic.

# ---------------------------------------------------------------------------
# Layer 2: per-MCP-tool defaults
# ---------------------------------------------------------------------------

# Linear — issue tracker. Read tools trivial; mutations are recoverable
# via Linear's own undo / status-change flow; delete is rarely undone.
[mcp.linear]
# --- Reads (TriviallyReversible) ---
list_issues = "TriviallyReversible"
list_all_issues = "TriviallyReversible"
list_issues_by_custom_view = "TriviallyReversible"
get_issue = "TriviallyReversible"
list_projects = "TriviallyReversible"
get_project = "TriviallyReversible"
list_teams = "TriviallyReversible"
get_team = "TriviallyReversible"
get_team_by_key = "TriviallyReversible"
get_team_members = "TriviallyReversible"
list_users = "TriviallyReversible"
get_user = "TriviallyReversible"
get_user_by_email = "TriviallyReversible"
viewer = "TriviallyReversible"
current_account = "TriviallyReversible"
list_accounts = "TriviallyReversible"
get_workflow_states = "TriviallyReversible"
list_comments = "TriviallyReversible"
get_comment = "TriviallyReversible"
list_attachments = "TriviallyReversible"
get_issue_history = "TriviallyReversible"
get_issue_relations = "TriviallyReversible"
list_issue_relations = "TriviallyReversible"
list_labels = "TriviallyReversible"
get_label = "TriviallyReversible"
list_cycles = "TriviallyReversible"
get_cycle = "TriviallyReversible"
get_active_cycle = "TriviallyReversible"
list_documents = "TriviallyReversible"
get_document = "TriviallyReversible"
list_notifications = "TriviallyReversible"
list_milestones = "TriviallyReversible"
get_milestone = "TriviallyReversible"
search = "TriviallyReversible"
# --- Mutations (ReversibleWithEffort) — undoable via Linear UI ---
create_issue = "ReversibleWithEffort"
update_issue = "ReversibleWithEffort"
batch_create_issues = "ReversibleWithEffort"
batch_update_issues = "ReversibleWithEffort"
create_comment = "ReversibleWithEffort"
add_comment = "ReversibleWithEffort"
update_comment = "ReversibleWithEffort"
add_issue_label = "ReversibleWithEffort"
remove_issue_label = "ReversibleWithEffort"
create_issue_relation = "ReversibleWithEffort"
delete_issue_relation = "ReversibleWithEffort"
subscribe_to_issue = "ReversibleWithEffort"
unsubscribe_from_issue = "ReversibleWithEffort"
switch_account = "ReversibleWithEffort"
add_account = "ReversibleWithEffort"
remove_account = "ReversibleWithEffort"
# --- Irreversible ---
delete_issue = "Irreversible"
delete_comment = "Irreversible"

# Confluence — org documentation. Pages are visible to others as soon as
# they're published; recovery requires the wiki's version-history UX.
[mcp.confluence]
get_page = "TriviallyReversible"
search = "TriviallyReversible"
list_spaces = "TriviallyReversible"
create_page = "Irreversible"
update_page = "Irreversible"
delete_page = "Irreversible"

# Notion — org documentation, peer of Confluence.
[mcp.notion]
get_page = "TriviallyReversible"
get_database = "TriviallyReversible"
query_database = "TriviallyReversible"
search = "TriviallyReversible"
create_page = "Irreversible"
update_page = "Irreversible"
delete_page = "Irreversible"
create_database_row = "Irreversible"
update_database_row = "Irreversible"

# Google Drive — unstructured docs. Reads trivial; uploads visible to
# anyone with share access (Irreversible from the operator's standpoint
# even if the file is technically recoverable from Drive's trash).
[mcp.drive]
list_files = "TriviallyReversible"
get_file_metadata = "TriviallyReversible"
read_file_content = "TriviallyReversible"
search_files = "TriviallyReversible"
upload_file = "Irreversible"
update_file = "Irreversible"
delete_file = "Irreversible"

# Gmail — once sent, cannot be unsent. Recall windows are best-effort and
# vendor-specific; for sentinel purposes, send is catastrophic.
[mcp.gmail]
list_messages = "TriviallyReversible"
get_message = "TriviallyReversible"
search = "TriviallyReversible"
list_labels = "TriviallyReversible"
send_message = "Catastrophic"
delete_message = "Irreversible"

# Slack — messages visible immediately. Edits possible but the message
# was already seen / notified / mirrored; treat as Irreversible.
[mcp.slack]
list_channels = "TriviallyReversible"
get_channel_history = "TriviallyReversible"
get_thread = "TriviallyReversible"
search_messages = "TriviallyReversible"
post_message = "Irreversible"
update_message = "Irreversible"
delete_message = "Irreversible"

# Sentinel's own MCP surface — almost entirely read/observability.
# Workflow-mutating tools (submit_phase_complete, update_step) are
# reversible with effort via the proof chain.
[mcp.sentinel]
get_proof_chain = "TriviallyReversible"
get_workflow_status = "TriviallyReversible"
verify_chain = "TriviallyReversible"
get_session_stats = "TriviallyReversible"
get_phase_steps = "TriviallyReversible"
get_workflow_progress = "TriviallyReversible"
submit_phase_complete = "ReversibleWithEffort"
update_step = "ReversibleWithEffort"
regenerate_claude_md = "ReversibleWithEffort"
edit_claude_md_template = "ReversibleWithEffort"
restart_all_mcps = "ReversibleWithEffort"

# ---------------------------------------------------------------------------
# Layer 3: Bash command patterns
# ---------------------------------------------------------------------------
#
# First-match wins. Order matters: put the most-specific catastrophic
# patterns FIRST so they classify before more-general patterns demote
# them.
#
# Regex syntax is the `regex` crate's flavor — no look-around. Patterns
# match anywhere in the command string unless anchored with `^`/`$`.
#
# When NO pattern matches, the adapter falls back to ReversibleWithEffort
# (the conservative Bash default — assume any unrecognized command
# is mutating).

# --- Catastrophic: irrecoverable + high blast radius -----------------------

[[bash.pattern]]
match = "^rm[[:space:]]+-rf[[:space:]]+/[[:space:]]*$"
class = "Catastrophic"
# rm -rf / — root-deletion.

[[bash.pattern]]
match = "^rm[[:space:]]+-rf[[:space:]]+[^./]"
class = "Catastrophic"
# rm -rf <abs-or-bare-name> — non-relative deletion.

[[bash.pattern]]
match = "(?i)DROP[[:space:]]+(DATABASE|TABLE|SCHEMA)"
class = "Catastrophic"
# SQL drop statements.

[[bash.pattern]]
match = "(?i)TRUNCATE[[:space:]]+TABLE"
class = "Catastrophic"
# SQL truncate.

[[bash.pattern]]
match = "git[[:space:]]+push[[:space:]]+(--force|-f)[[:space:]]+.*[[:space:]]+(main|master)"
class = "Catastrophic"
# Force-push to a protected branch.

[[bash.pattern]]
match = "terraform[[:space:]]+destroy.*(prod|production)"
class = "Catastrophic"
# Terraform destroy on prod.

[[bash.pattern]]
match = "kubectl[[:space:]]+delete.*(prod|production)"
class = "Catastrophic"
# Kubectl delete against prod.

[[bash.pattern]]
match = "(?i)DELETE[[:space:]]+FROM[[:space:]]+[a-zA-Z_]+[[:space:]]*;"
class = "Catastrophic"
# DELETE FROM <table>; without WHERE — full-table wipe.

[[bash.pattern]]
match = "aws[[:space:]]+s3[[:space:]]+rb[[:space:]]+.*--force"
class = "Catastrophic"
# `aws s3 rb --force` — bucket-with-contents deletion. The bucket
# AND every object in it are gone; no soft-delete unless versioning
# was on (often isn't).

[[bash.pattern]]
match = "aws[[:space:]]+rds[[:space:]]+delete-db-instance.*--skip-final-snapshot"
class = "Catastrophic"
# RDS instance delete without taking the final snapshot. The
# `--skip-final-snapshot` flag is the explicit "I don't want to
# keep the data" choice; without it, RDS keeps a snapshot you can
# restore from.

[[bash.pattern]]
match = "aws[[:space:]]+iam[[:space:]]+delete-(user|role|policy)"
class = "Catastrophic"
# IAM principal deletion — breaks anything using the identity.
# Recovery requires recreating + re-binding everywhere; in
# practice teams declare the surface lost and migrate.

[[bash.pattern]]
match = "^gcloud[[:space:]]+projects[[:space:]]+delete"
class = "Catastrophic"
# GCP project delete — 30-day soft-delete, but the time window is
# easy to miss and the action drops every service in the project.

[[bash.pattern]]
match = "kubectl[[:space:]]+delete[[:space:]]+(namespace|ns)([[:space:]]|$)"
class = "Catastrophic"
# Namespace delete is mass-delete: every workload, service,
# configmap, secret, pvc in the namespace goes with it.

[[bash.pattern]]
match = "^(helm[[:space:]]+uninstall|helm[[:space:]]+delete).*(prod|production)"
class = "Catastrophic"
# Helm uninstall on a prod-tagged release. Removes every resource
# the chart created.

[[bash.pattern]]
match = "^gh[[:space:]]+repo[[:space:]]+delete"
class = "Catastrophic"
# `gh repo delete` — repo + every fork relationship + every
# downstream CI integration gone. Recovery is "did anyone keep a
# clone".

[[bash.pattern]]
match = "^dropdb([[:space:]]|$)"
class = "Catastrophic"
# Postgres `dropdb` CLI — drops an entire database. The DROP
# DATABASE SQL pattern above only catches the in-SQL form;
# this catches the CLI shorthand.

[[bash.pattern]]
match = "git[[:space:]]+push[[:space:]]+(--force|-f)[[:space:]]+.*[[:space:]]+(release|prod|production)"
class = "Catastrophic"
# Force-push to release/prod branches. The existing rule above
# only catches main/master; this widens to other commonly-
# protected branch names.

[[bash.pattern]]
match = "^(chmod[[:space:]]+777|chmod[[:space:]]+-R[[:space:]]+777)[[:space:]]+/(etc|usr|var|bin|sbin)"
class = "Catastrophic"
# chmod 777 on a system directory — security catastrophe and
# pragmatically irreversible (no record of prior modes).

# --- Irreversible: visible outside operator control ------------------------

[[bash.pattern]]
match = "git[[:space:]]+push[[:space:]]+--force-with-lease"
class = "ReversibleWithEffort"
# --force-with-lease is the safer flag; demoted from the generic
# force-push catastrophic above only when explicitly used.

[[bash.pattern]]
match = "^git[[:space:]]+push([[:space:]]|$)"
class = "Irreversible"
# Plain git push — visible in shared history; recovery requires force-push.

[[bash.pattern]]
match = "^terraform[[:space:]]+apply"
class = "Irreversible"
# Terraform apply (non-prod variant captured above for catastrophic).

[[bash.pattern]]
match = "^(npm|pnpm|yarn|bun)[[:space:]]+publish"
class = "Irreversible"
# Package publish — visible to the registry; unpublish has tight time windows.

[[bash.pattern]]
match = "^cargo[[:space:]]+publish"
class = "Irreversible"
# Crates.io publish — irrevocable per crates.io policy.

[[bash.pattern]]
match = "^(gh|hub)[[:space:]]+pr[[:space:]]+create"
class = "Irreversible"
# Public PR creation — visible to reviewers / CI / external audiences.

[[bash.pattern]]
match = "^(gh|hub)[[:space:]]+release[[:space:]]+create"
class = "Irreversible"
# GitHub release.

[[bash.pattern]]
match = "^docker[[:space:]]+push"
class = "Irreversible"
# Docker image push.

# --- ReversibleWithEffort: local + recoverable ----------------------------

[[bash.pattern]]
match = "^git[[:space:]]+(commit|reset|checkout|stash|branch|merge|rebase)([[:space:]]|$)"
class = "ReversibleWithEffort"
# Git operations confined to the local working tree (until push).

[[bash.pattern]]
match = "^(cargo|npm|pnpm|yarn|bun)[[:space:]]+(build|test|check|fmt|clippy|run)"
class = "ReversibleWithEffort"
# Local build / test commands — produce artifacts in target/ etc.

# --- TriviallyReversible: read-only observation ---------------------------

[[bash.pattern]]
match = "^(ls|cat|head|tail|grep|find|file|wc|stat|du|df|ps|top|env|which|whoami|pwd)([[:space:]]|$)"
class = "TriviallyReversible"
# Plain read-only Unix commands.

[[bash.pattern]]
match = "^git[[:space:]]+(status|log|diff|show|branch[[:space:]]+--list|remote[[:space:]]+(-v|show)|worktree[[:space:]]+list|reflog)"
class = "TriviallyReversible"
# Read-only git introspection.

[[bash.pattern]]
match = "^(echo|printf|true|false|exit|history|date)([[:space:]]|$)"
class = "TriviallyReversible"
# Built-in / shell-internal commands that don't touch state.

# ---------------------------------------------------------------------------
# Layer 4: operator overrides (empty in the shipped defaults file —
# operators add their own in a sibling config/reversibility.toml)
# ---------------------------------------------------------------------------

[overrides]
# Example (commented out — operators uncomment + add their own):
# "mcp__custom__safe_tool" = "TriviallyReversible"
# "mcp__ba_orchestrator__publish_exec_deck" = "Catastrophic"
