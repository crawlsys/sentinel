# Sentinel reversibility classification — shipped defaults.
#
# Read by `sentinel_infrastructure::reversibility::LayeredReversibilityClassifier`
# at sentinel startup. Operators add per-workflow refinements in a sibling
# `config/reversibility.toml` (Layer 4 overrides); the loader merges the two
# files per the rules in the adapter's module docstring.
#
# Per the A6 design (`docs/a6-reversibility-graded-tripwires.md`), every
# blast-radius gate in sentinel consults the resulting class. Conservative
# defaults are load-bearing: unknown MCP server/tool falls back to
# Irreversible; unmatched Bash command falls back to ReversibleWithEffort.
# These TOML entries make those fallbacks more specific.
#
# Editing this file is OK; the schema is the same as operator overrides.
# Tests in `sentinel-infrastructure/src/reversibility.rs` exercise the
# shipped contents via `include_str!` — TOML edits that break the schema
# or change a smoke-test-asserted classification will fail CI.
#
# Class values: TriviallyReversible | ReversibleWithEffort | Irreversible | Catastrophic.

# ---------------------------------------------------------------------------
# Layer 2: per-MCP-tool defaults
# ---------------------------------------------------------------------------

