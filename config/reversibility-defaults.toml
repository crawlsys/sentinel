# side effect. Must be TriviallyReversible or the conservative MCP default
# (Irreversible) strands it at the A3 dry-run gate — which in turn deadlocks
# against `tool_usage_gate`, since that gate REQUIRES a sequentialthinking
# call before code edits. Two [Sentinel-Authority] gates in direct
# contradiction; this entry breaks the cycle.
[mcp.sequential-thinking]
sequentialthinking = "TriviallyReversible"

# Memory engine (memory-mcp) — atom store reads + capture. Reads are
