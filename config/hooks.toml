# Sentinel Hook Registrations
#
# Each hook has: id, event, matcher (optional), depends_on, has_api_call.
# The dependency graph determines execution order within each event.

# === SessionStart ===

[[hooks]]
id = "session-init"
event = "SessionStart"
description = "Initialize session state, generate CLAUDE.md"
depends_on = []
has_api_call = false

[[hooks]]
id = "memory-provision"
event = "SessionStart"
description = "Verify memory engine binaries, provision the Qdrant credential from Doppler (fetch when missing/invalid/expired), and idempotently register the memory MCP server in ~/.claude.json (atomic + .bak). require_remote (default true): withholds registration + surfaces a console error when no working credential can be provisioned."
depends_on = ["session-init"]
has_api_call = false

[[hooks]]
id = "upstream-freshness"
event = "SessionStart"
description = "Notify (never mutate) when local default branch is behind origin; names the one-click `git pull --ff-only`. Zero-network: compares against the already-fetched ref. Default branch only; fails silent otherwise. Also runs on CwdChanged."
depends_on = []
has_api_call = false

# Note: `memory-verify` was removed from SessionStart on 2026-04 because
# Qdrant HTTP calls blocked startup for 5–20s. It now runs on PreCompact
# instead — see the PreCompact section below.

# === UserPromptSubmit ===

[[hooks]]
id = "skill-router"
event = "UserPromptSubmit"
description = "Detect skill from user message (regex + AI classifier)"
depends_on = []
has_api_call = true  # Uses Sonnet for AI classification

[[hooks]]
id = "todo-loader"
event = "UserPromptSubmit"
description = "Inject persistent todos into context"
depends_on = []
has_api_call = false

[[hooks]]
id = "phase-validator"
event = "UserPromptSubmit"
description = "Validate phase completion and inject progress"
depends_on = ["skill-router"]
has_api_call = true  # Uses Haiku for validation

[[hooks]]
id = "worktree-reminder"
event = "UserPromptSubmit"
description = "Remind to use git worktrees for code changes in repos"
depends_on = []
has_api_call = false

[[hooks]]
id = "hygiene-override"
event = "UserPromptSubmit"
description = "Override hygiene rules when appropriate"
depends_on = []
has_api_call = false

[[hooks]]
id = "linear-inbound-sync"
event = "UserPromptSubmit"
description = "INBOUND Linear→task sync: poll Linear GraphQL for in-progress @linear-tagged tasks that moved to a terminal state (completed/canceled) and inject TaskUpdate instructions. Best-effort, fail-open, throttled to one poll per 5min per session. Key resolved from env then ~/.claude/sentinel/secrets.toml."
depends_on = []
has_api_call = true  # Linear GraphQL HTTP

[[hooks]]
id = "memory-inject"
event = "UserPromptSubmit"
description = "Search Qdrant for semantically relevant memories and inject into context"
depends_on = []
has_api_call = true  # Qdrant HTTP search

# === PreToolUse ===

[[hooks]]
id = "bug-task-gate"
event = "PreToolUse"
description = "Block mutating tools when a bug signal was observed and no TaskCreate has filed it yet"
depends_on = []
has_api_call = false

[[hooks]]
id = "task-decomposition-gate"
event = "PreToolUse"
description = "Block mutating tools (Edit/Write/state-changing Bash) when no live decomposed task list exists; require numbered #N + Na/Nb real child subtasks, [P0-P3] priority, two-emoji prefix (status ⬜🔄✅❌ then priority 🔴🟠🟡🟢), parent mirror checklist, blocking deps. Reads/Task*/sequential-thinking always allowed; fails open when task state is unreadable."
depends_on = []
has_api_call = false

[[hooks]]
id = "skill-invocation-gate"
event = "PreToolUse"
description = "Block tool use when skill_router detected a skill that has not been invoked"
depends_on = ["skill-router"]
has_api_call = false

[[hooks]]
id = "phase-gate"
event = "PreToolUse"
description = "Block tool use if skill phases are skipped"
depends_on = ["skill-router"]
has_api_call = false

[[hooks]]
id = "ticket-quality-gate"
event = "PreToolUse"
matcher = ["mcp__linear__create_issue", "mcp__linear__update_issue"]
description = "ENFORCING: DENY a Linear ticket create/update that is not dev-ready (missing estimate/priority 1-4/Type+Area labels/substantive description), with a guided AskUserQuestion fix-path. Scoped to ticket writes only; non-Linear + read tools pass through. (Tier A of the bad-PM-is-bad-software factory.)"
depends_on = []
has_api_call = false

[[hooks]]
id = "git-hygiene-gate"
event = "PreToolUse"
matcher = ["Edit", "Write"]
description = "Block edits on protected branch without worktree or too many uncommitted files"
depends_on = []
has_api_call = false

[[hooks]]
id = "tool-usage-gate"
event = "PreToolUse"
matcher = ["Edit", "Write"]
description = "Block edits without sequential thinking or task creation"
depends_on = []
has_api_call = false

[[hooks]]
id = "doppler-auth0-gate"
event = "PreToolUse"
description = "Block Doppler/Auth0 mutation tools without explicit permission"
depends_on = []
has_api_call = false

[[hooks]]
id = "pr-merge-gate"
event = "PreToolUse"
matcher = ["Bash"]
description = "Block gh pr merge without explicit user confirmation"
depends_on = []
has_api_call = false

[[hooks]]
id = "db-ops-gate"
event = "PreToolUse"
matcher = ["Bash"]
description = "Block production database migrations and destructive operations"
depends_on = []
has_api_call = false

[[hooks]]
id = "plan-title-gate"
event = "PreToolUse"
matcher = ["ExitPlanMode"]
description = "Block ExitPlanMode only when the plan has no derivable title, so plan_organizer can always file it under a descriptive name. Fails open."
depends_on = []
has_api_call = false

[[hooks]]
id = "output-compressor"
event = "PreToolUse"
matcher = ["Bash"]
description = "Route noisy commands (cargo/git/grep/find) through `sentinel compress` to cut token usage; preserves all error/result/warning lines verbatim. Bypass with SENTINEL_COMPRESS_BYPASS=1"
depends_on = []
has_api_call = false

[[hooks]]
id = "todo-interceptor"
event = "PreToolUse"
description = "Track todo-related tool calls"
depends_on = []
has_api_call = false

# === PostToolUse ===

[[hooks]]
id = "bug-task-gate-detect"
event = "PostToolUse"
description = "Scan tool output for bug signals; clear pending-bug state when a TaskCreate references the bug"
depends_on = []
has_api_call = false

[[hooks]]
id = "skill-invocation-gate-clear"
event = "PostToolUse"
description = "Clear skill-invocation-gate pending state when the detected skill is invoked or its SKILL.md is read"
depends_on = []
has_api_call = false

[[hooks]]
id = "evidence-collector"
event = "PostToolUse"
description = "Collect tool results as evidence for proof chain"
depends_on = []
has_api_call = false

[[hooks]]
id = "step-judge"
event = "PostToolUse"
matcher = "mcp__skills__"
description = "Run the adversarial AI judge on completed step-tool evidence and persist the verdict consumed by submit_step_complete. Enforcement is structural: insufficient verdicts cannot seal StepProof."
depends_on = ["evidence-collector"]
has_api_call = true

[[hooks]]
id = "test-evidence-recorder"
event = "PostToolUse"
matcher = ["Bash"]
description = "Append a JSONL line keyed by session_id when a Bash command matches a test/build pattern. Read by pre_commit_verification; replaces transcript-parsing."
depends_on = []
has_api_call = false

[[hooks]]
id = "good-citizen-observer-record"
event = "PostToolUse"
matcher = ["Bash"]
description = "Scan Bash output for warnings, dead-code, test failures, TODO/FIXME — record observations to ~/.claude/sentinel/state/good-citizen/{session_id}.jsonl"
depends_on = []
has_api_call = false

[[hooks]]
id = "ask-question-resync-nudge"
event = "PostToolUse"
matcher = ["AskUserQuestion"]
description = "When an AskUserQuestion answer looks direction-changing, inject an advisory reminder to re-sync the affected task subtree (child subjects AND descriptions, delete superseded chains). Soft nudge only — never blocks."
depends_on = []
has_api_call = false

[[hooks]]
id = "account-cascade"
event = "PostToolUse"
description = "Auto-switch all MCP servers after account_switch/account_rotate/project_switch"
depends_on = []
has_api_call = false

[[hooks]]
id = "pr-auto-monitor"
event = "PostToolUse"
matcher = ["Bash"]
description = "Inject CronCreate for PR monitoring after gh pr create, git push, merge"
depends_on = []
has_api_call = false

[[hooks]]
id = "build-auto-monitor"
event = "PostToolUse"
matcher = ["Bash"]
description = "Inject monitoring suggestions for background builds"
depends_on = []
has_api_call = false

[[hooks]]
id = "linear-lifecycle"
event = "PostToolUse"
description = "Inject CronCreate for Linear issue lifecycle monitoring"
depends_on = []
has_api_call = false

