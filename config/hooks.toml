depends_on = []
has_api_call = false

[[hooks]]
id = "context-monitor"
event = "Stop"
description = "Track context window usage percentage"
depends_on = []
has_api_call = false

[[hooks]]
id = "commit-hygiene"
event = "Stop"
description = "Warn about uncommitted changes at end of response"
depends_on = []
has_api_call = false

[[hooks]]
id = "execution-log"
event = "Stop"
description = "Capture [RUN]/[STEP]/[PHASE] markers from transcript"
depends_on = []
has_api_call = false

[[hooks]]
id = "skill-telemetry"
event = "Stop"
description = "Record skill usage analytics"
depends_on = ["execution-log"]
