[[hooks]]
id = "memory-extract"
event = "Stop"
description = "Sync recently modified memory files (~/.claude/session-env/.../memory/*.md) to Qdrant"
depends_on = []
has_api_call = true  # Qdrant upsert

[[hooks]]
id = "memory-feedback"
event = "Stop"
description = "Boost used memories, flag corrections for review"
depends_on = ["memory-extract"]
has_api_call = true  # Qdrant set_payload call

[[hooks]]
id = "memory-inject-precompute"
event = "Stop"
description = "Pre-compute Qdrant search results for the next UserPromptSubmit's memory-inject"
depends_on = []
has_api_call = true  # Qdrant HTTP search

[[hooks]]
id = "good-citizen-observer-remind"
event = "Stop"
description = "Surface unaddressed warnings/findings observed during the turn — soft reminder to file TaskCreate for pre-existing issues"
depends_on = []
has_api_call = false

[[hooks]]
id = "claim-reality-check"
event = "Stop"
description = "Sweep newly-completed (✅) tasks and flag any whose commit/PR/merge claim fails git/gh verification (false-done detection)"
depends_on = []
has_api_call = false  # local git + gh subprocess only

# === PreCompact ===

[[hooks]]
id = "pre-compact"
event = "PreCompact"
description = "Preserve critical context before auto-compact"
depends_on = []
has_api_call = false

[[hooks]]
id = "session-index"
event = "PreCompact"
description = "Upsert transcript exchanges to Qdrant `claude-sessions` collection for cross-session search"
depends_on = ["pre-compact"]
has_api_call = true  # Qdrant upsert

[[hooks]]
id = "memory-verify"
event = "PreCompact"
description = "Re-check stored memories against ground truth (Qdrant scroll + claim verification, 24h cooldown, 3s wall-clock timeout)"
depends_on = ["pre-compact"]
has_api_call = true  # Qdrant scroll + OpenRouter claim extraction

# === CwdChanged ===

[[hooks]]
id = "cwd-changed"
event = "CwdChanged"
description = "Re-detect project context when the working directory changes"
depends_on = []
has_api_call = false

[[hooks]]
id = "upstream-freshness"
event = "CwdChanged"
description = "Notify when the repo just switched into has a local default branch behind origin (zero-network, notify-only one-click pull)"
depends_on = []
has_api_call = false
