# Review Skill — Step Definitions
# 22 individually trackable steps across 5 phases
#
# Phases: gather → spec → quality → consolidate → track
# NOTE: Two-stage review — spec compliance first, then quality agents

# ============================================================================
# Phase 1: Gather — Context and changed files
# ============================================================================

[[phases]]
id = "gather"

[[phases.steps]]
id = "1.1"
description = "Get list of changed files (git diff)"

[[phases.steps]]
id = "1.2"
description = "Read PR description and metadata"

[[phases.steps]]
id = "1.3"
description = "Detect linked issues and requirements"

[[phases.steps]]
id = "1.4"
description = "Identify review scope and boundaries"

# ============================================================================
# Phase 2: Spec Compliance — Stage 1 (requirements match)
# ============================================================================

[[phases]]
id = "spec"

[[phases.steps]]
id = "2.1"
description = "Load spec-compliance agent"

[[phases.steps]]
id = "2.2"
description = "Check requirements match against spec/acceptance criteria"

[[phases.steps]]
id = "2.3"
description = "Identify YAGNI (code that exceeds requirements)"

[[phases.steps]]
id = "2.4"
description = "Verify no critical missing items"
blocker = true

# ============================================================================
# Phase 3: Quality — Stage 2 (parallel review agents)
# ============================================================================

[[phases]]
id = "quality"

[[phases.steps]]
id = "3.1"
description = "Launch correctness review agent"

[[phases.steps]]
id = "3.2"
description = "Launch security review agent"

[[phases.steps]]
id = "3.3"
description = "Launch performance review agent"

[[phases.steps]]
id = "3.4"
description = "Launch maintainability review agent"

[[phases.steps]]
id = "3.5"
description = "Launch test coverage review agent"

[[phases.steps]]
id = "3.6"
description = "Collect and deduplicate agent findings"

# ============================================================================
# Phase 4: Consolidate — Merge, prioritize, format
# ============================================================================

[[phases]]
id = "consolidate"

[[phases.steps]]
id = "4.1"
description = "Merge findings from both stages"

[[phases.steps]]
id = "4.2"
description = "Prioritize findings by severity"

[[phases.steps]]
id = "4.3"
description = "Format review report with code references"

[[phases.steps]]
id = "4.4"
description = "Extract Loom walkthrough context (if PR has Loom URL)"

# ============================================================================
# Phase 5: Track — Create todos for findings
# ============================================================================

[[phases]]
id = "track"

[[phases.steps]]
id = "5.1"
description = "Create todos for each actionable finding"

[[phases.steps]]
id = "5.2"
description = "Tag findings with severity labels"

[[phases.steps]]
id = "5.3"
description = "Generate review summary with statistics"

[[phases.steps]]
id = "5.4"
description = "Report final pass/fail status"
