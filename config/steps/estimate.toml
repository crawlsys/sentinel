federation_version = "1"

# Estimate Skill — Step Definitions
# 18 individually trackable steps across 4 phases
#
# Phases: analyze → decompose → size → present

# ============================================================================
# Phase 1: Analyze
# ============================================================================

[[phases]]
id = "analyze"

[[phases.steps]]
id = "1.1"
description = "Understand requirements and scope"

[[phases.steps]]
id = "1.2"
description = "Explore codebase for affected areas"

[[phases.steps]]
id = "1.3"
description = "Identify unknowns and assumptions"

[[phases.steps]]
id = "1.4"
description = "Assess technical complexity"

[[phases.steps]]
id = "1.5"
description = "Review similar past work for reference"

# ============================================================================
# Phase 2: Decompose
# ============================================================================

[[phases]]
id = "decompose"

[[phases.steps]]
id = "2.1"
description = "Break into discrete subtasks"

[[phases.steps]]
id = "2.2"
description = "Identify dependencies between subtasks"

[[phases.steps]]
id = "2.3"
description = "Classify each subtask by complexity (S/M/L/XL)"

[[phases.steps]]
id = "2.4"
description = "Identify parallelizable work"

# ============================================================================
# Phase 3: Size
# ============================================================================

[[phases]]
id = "size"

[[phases.steps]]
id = "3.1"
description = "Apply estimation model to each subtask"

[[phases.steps]]
id = "3.2"
description = "Calculate optimistic, likely, and pessimistic ranges"

[[phases.steps]]
id = "3.3"
description = "Identify risks that widen estimate ranges"

[[phases.steps]]
id = "3.4"
description = "Account for testing and review overhead"

[[phases.steps]]
id = "3.5"
description = "Aggregate into total estimate with confidence interval"

# ============================================================================
# Phase 4: Present
# ============================================================================

[[phases]]
id = "present"

[[phases.steps]]
id = "4.1"
description = "Format estimate with ranges and breakdown"

[[phases.steps]]
id = "4.2"
description = "Explain assumptions and constraints"

[[phases.steps]]
id = "4.3"
description = "Recommend approach (sequential vs parallel)"

[[phases.steps]]
id = "4.4"
description = "Highlight highest-risk items"
