# Browserbase Tester Skill — Step Definitions
# Localhost target: mcp__cdp__* (edge-cdp skill, no cloudflared needed).
# Remote target (staging, production): mcp__browserbase__*.
# 32 individually trackable steps across 8 phases
#
# Phases: setup → crawl → login → test → a11y → file-issues → report → cleanup

# ============================================================================
# Phase 1: Setup — Target, config, credentials, browser session (CDP or Browserbase)
# ============================================================================

[[phases]]
id = "setup"

[[phases.steps]]
id = "1.1"
description = "Determine target URL (local/staging/custom)"

[[phases.steps]]
id = "1.2"
description = "Load project config from linear/projects/"

[[phases.steps]]
id = "1.3"
description = "Get credentials from Doppler (if auth needed)"

[[phases.steps]]
id = "1.4"
description = "Create browser session (mcp__cdp__launch for localhost, mcp__browserbase__create_session for remote)"
blocker = true

[[phases.steps]]
id = "1.5"
description = "Start Cloudflare tunnel (if local target)"

# ============================================================================
# Phase 2: Discovery (Crawl) — Navigate and extract links
# ============================================================================

[[phases]]
id = "crawl"

[[phases.steps]]
id = "2.1"
description = "Navigate to homepage and screenshot"

[[phases.steps]]
id = "2.2"
description = "Extract all navigation links via evaluate_js"

[[phases.steps]]
id = "2.3"
description = "Build test plan from discovered pages"

# ============================================================================
# Phase 3: Login — Authenticate if required
# ============================================================================

[[phases]]
id = "login"

[[phases.steps]]
id = "3.1"
description = "Navigate to login page"

[[phases.steps]]
id = "3.2"
description = "Fill credentials using element discovery pattern"

[[phases.steps]]
id = "3.3"
description = "Submit and verify successful login"
blocker = true

[[phases.steps]]
id = "3.4"
description = "Screenshot post-login state"

# ============================================================================
# Phase 4: Systematic Testing — Per-page health checks
# ============================================================================

[[phases]]
id = "test"

[[phases.steps]]
id = "4.1"
description = "Navigate to page and wait for load"

[[phases.steps]]
id = "4.2"
description = "Screenshot page at loaded state"

[[phases.steps]]
id = "4.3"
description = "Run page health check (body length, broken images, empty elements)"

[[phases.steps]]
id = "4.4"
description = "Check console for JS errors and failed resources"

[[phases.steps]]
id = "4.5"
description = "Test interactive elements (buttons, forms, links)"

[[phases.steps]]
id = "4.6"
description = "Collect findings per page"

# ============================================================================
# Phase 5: Accessibility Audit — axe-core on key pages
# ============================================================================

[[phases]]
id = "a11y"

[[phases.steps]]
id = "5.1"
description = "Inject axe-core via evaluate_js"

[[phases.steps]]
id = "5.2"
description = "Run axe.run() and collect violations"

[[phases.steps]]
id = "5.3"
description = "Classify violations by impact (critical/serious/moderate/minor)"

# ============================================================================
# Phase 6: Auto-File Linear Issues — One issue per bug
# ============================================================================

[[phases]]
id = "file-issues"

[[phases.steps]]
id = "6.1"
description = "Determine severity for each finding"

[[phases.steps]]
id = "6.2"
description = "Check for duplicate issues via linear search"

[[phases.steps]]
id = "6.3"
description = "Create Linear issue with screenshot and details"

# ============================================================================
# Phase 7: Evidence & Report — Compile results
# ============================================================================

[[phases]]
id = "report"

[[phases.steps]]
id = "7.1"
description = "Compile screenshots into evidence (Loom if available)"

[[phases.steps]]
id = "7.2"
description = "Generate formatted summary report"

# ============================================================================
# Phase 8: Cleanup — Release session and tunnel
# ============================================================================

[[phases]]
id = "cleanup"

[[phases.steps]]
id = "8.1"
description = "Release Browserbase session (remote) or close CDP instance (local)"
blocker = true

[[phases.steps]]
id = "8.2"
description = "Kill Cloudflare tunnel (if local mode)"
