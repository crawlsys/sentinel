description = "Navigate to feature"
suggested_tools = ["mcp__browserbase__navigate", "mcp__browserbase__screenshot"]
artifact_schema = { session_id = "string (from 3.5.0.4)", feature_url = "string", page_loaded = "bool", screenshot_path = "string" }

[[phases.steps]]
