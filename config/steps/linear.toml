suggested_tools = ["mcp__linear__update_issue", "mcp__linear__get_workflow_states"]
artifact_schema = { issue_id = "string (from fetch/1.1)", transitioned_from = "string — usually 'In Progress' or 'Code Review'", transitioned_to = "string — 'QA Testing'", state_id_after = "string (UUID)", note = "may be a no-op when linear-on-merge.yml already moved the issue" }

[[phases.steps]]
