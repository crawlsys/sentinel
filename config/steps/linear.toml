# Linear Skill — Step Definitions
# 120+ individually trackable steps across 8 phases
#
# Each phase maps to a workflow phase in config/workflows.toml.
# Steps marked blocker = true must pass before the phase can advance.
# Sub-steps (e.g. "1.5.3a") are transforms that run in parallel.

# ============================================================================
# Phase -0 & Phase 0: Pre-Claim Guardrail + Claim Issue
# ============================================================================

[[phases]]
id = "claim"

[[phases.steps]]
id = "-0.1"
description = "Verify issue exists and is actionable"
blocker = true

[[phases.steps]]
