artifact_schema = { session_id = "string (from 3.5.0.4)", elements_verified = "array of {selector, exists, visible}", flow_steps_passed = "int", flow_steps_failed = "int", console_errors = "array of strings", final_screenshot = "string (path)" }

[[phases.steps]]
