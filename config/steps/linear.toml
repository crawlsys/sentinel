# --- Step 3: Loom Pipeline ---

[[phases.steps]]
id = "3.5.3.1"
description = "Collect screenshots"
artifact_schema = { local_screenshots = "array of strings (paths from 3.5.0.5/7/8)", staging_screenshots = "array of strings (paths from 3.5.2.3/4)", combined_count = "int" }

[[phases.steps]]
id = "3.5.3.2"
description = "Check ffmpeg availability"
suggested_tools = ["Bash:ffmpeg -version"]
artifact_schema = { ffmpeg_installed = "bool", ffmpeg_version = "string | null", skipped_reason = "string | null — populated when ffmpeg missing; pipeline falls back to direct Browserbase recording" }

[[phases.steps]]
id = "3.5.3.3"
description = "Create video from screenshots"
suggested_tools = ["Bash:ffmpeg -framerate ... -i screenshots/*.png out.mp4"]
artifact_schema = { input_screenshots = "array of strings (from 3.5.3.1 combined)", output_video_path = "string", duration_seconds = "number", width = "int", height = "int" }

[[phases.steps]]
id = "3.5.3.4"
description = "Upload to Loom"
suggested_tools = ["mcp__loom__upload_video"]
artifact_schema = { video_path = "string (from 3.5.3.3 output_video_path)", loom_video_id = "string", loom_title = "string — usually '<identifier>: <issue title>'", uploaded_at = "string (ISO-8601)" }

[[phases.steps]]
id = "3.5.3.5"
description = "Get share URL"
suggested_tools = ["mcp__loom__get_video_info"]
artifact_schema = { loom_video_id = "string (from 3.5.3.4)", share_url = "string", embed_url = "string | null", thumbnail_url = "string | null" }

