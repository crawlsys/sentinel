suggested_tools = ["mcp__linear__update_issue", "mcp__linear__get_user_by_email"]
artifact_schema = { issue_id = "string (from fetch/1.1)", qa_tester_email = "string — from project config qa.tester_email", qa_tester_id = "string (UUID)", assigned_from = "string (UUID, viewer)", assigned_to = "string (UUID, qa_tester_id)" }

[[phases.steps]]
id = "3.5.6"
description = "Post implementation comment"
suggested_tools = ["mcp__linear__create_comment"]
artifact_schema = { issue_id = "string (from fetch/1.1)", comment_id = "string", comment_body_md = "string — includes PR link, Loom share_url, deploy_url, key changes summary", linear_handoff_complete = "bool" }

# ============================================================================
# Phase 4: Cleanup
# ============================================================================

[[phases]]
id = "cleanup"

[[phases.steps]]
id = "4.1"
description = "Remove worktree"
suggested_tools = ["ExitWorktree", "Bash:git worktree remove"]
artifact_schema = { worktree_path = "string (from worktree/2.2)", removed = "bool", remaining_worktrees = "array of strings", residual_files_warning = "string | null — populated when Windows file locks left a shell behind" }

[[phases.steps]]
id = "4.2"
description = "Delete local branch"
suggested_tools = ["Bash:git branch -d"]
artifact_schema = { branch_name = "string (from worktree/2.1)", deleted = "bool", was_merged = "bool — must be true; -d refuses unmerged unless forced", final_sha = "string — last sha the branch pointed at, for audit" }

[[phases.steps]]
id = "4.3"
description = "Prune stale references"
suggested_tools = ["Bash:git fetch --prune", "Bash:git remote prune origin"]
artifact_schema = { remote = "string — usually 'origin'", pruned_refs = "array of strings", remote_branches_remaining = "int" }

[[phases.steps]]
id = "4.4"
description = "Confirm cleanup"
suggested_tools = ["Bash:git worktree list", "Bash:git branch --list"]
artifact_schema = { worktree_listed = "bool — false expected", branch_listed = "bool — false expected", cleanup_complete = "bool — must be true to mark linear skill cycle done", issue_id = "string (from fetch/1.1) — passed through for chain-end audit trail" }
