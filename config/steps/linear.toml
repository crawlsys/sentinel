suggested_tools = ["Bash:curl", "mcp__vercel__get_deployment", "mcp__railway__get_deployment"]
artifact_schema = { deploy_id = "string (from 3.5.1.1)", deploy_status = "string ('ready'|'error'|'building')", health_check_url = "string", health_status_code = "int — usually 200", health_response_body = "string (excerpt)", deploy_healthy = "bool — must be true to advance" }

