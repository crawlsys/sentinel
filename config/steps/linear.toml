[[phases.steps]]
id = "3.5.0.10"
description = "Local Steel gate"
blocker = true
artifact_schema = { flow_pass = "bool (from 3.5.0.8)", console_clean = "bool — no errors in 3.5.0.8 console_errors", recording_url = "string (from 3.5.0.9)", local_steel_gate_passed = "bool — must be true to advance to deploy" }

# --- Step 1: Deploy ---

