federation_version = "1"

# Browserbase Skill — Step Definitions
# ~35 individually trackable steps across 6 phases
#
# Each phase maps to a workflow phase in config/workflows.toml ([browserbase]).
# Steps marked blocker = true must pass before the phase can advance.
#
# Browserbase is REMOTE-ONLY (preview URLs, staging, production). For
# localhost browser automation use the edge-cdp skill (mcp__cdp__*).

# ============================================================================
# Phase 1: Setup Session
# ============================================================================

[[phases]]
id = "setup"

[[phases.steps]]
id = "1.1"
description = "Determine session options (headless, captcha, proxy)"

[[phases.steps]]
id = "1.2"
description = "Create Browserbase cloud browser session"
blocker = true

[[phases.steps]]
id = "1.3"
description = "Verify session is active and responsive"
blocker = true

[[phases.steps]]
id = "1.4"
description = "Configure viewport and user agent if needed"

[[phases.steps]]
id = "1.5"
description = "Load credentials from Doppler if authentication required"

[[phases.steps]]
id = "1.6"
description = "Log session ID for audit trail"

# ============================================================================
# Phase 2: Navigate
# ============================================================================

[[phases]]
id = "navigate"

[[phases.steps]]
id = "2.1"
description = "Navigate to target URL"

[[phases.steps]]
id = "2.2"
description = "Wait for page load (DOMContentLoaded + network idle)"
blocker = true

[[phases.steps]]
id = "2.3"
description = "Handle redirects (follow chain, verify final URL)"

[[phases.steps]]
id = "2.4"
description = "Check for error pages (404, 500, access denied)"
blocker = true

[[phases.steps]]
id = "2.5"
description = "Take initial screenshot for baseline"

[[phases.steps]]
id = "2.6"
description = "Wait for dynamic content to render"

# ============================================================================
# Phase 3: Interact
# ============================================================================

[[phases]]
id = "interact"

[[phases.steps]]
id = "3.1"
description = "Click target elements (buttons, links, tabs)"

[[phases.steps]]
id = "3.2"
description = "Fill form fields with test data"

[[phases.steps]]
id = "3.3"
description = "Submit forms and wait for response"

[[phases.steps]]
id = "3.4"
description = "Execute custom JavaScript for complex interactions"

[[phases.steps]]
id = "3.5"
description = "Handle CAPTCHA challenges if encountered"

[[phases.steps]]
id = "3.6"
description = "Navigate multi-step flows (wizards, checkout)"

[[phases.steps]]
id = "3.7"
description = "Wait for async operations to complete"

# ============================================================================
# Phase 4: Capture
# ============================================================================

[[phases]]
id = "capture"

[[phases.steps]]
id = "4.1"
description = "Take full-page screenshot"

[[phases.steps]]
id = "4.2"
description = "Take element-specific screenshots"

[[phases.steps]]
id = "4.3"
description = "Scrape page content (HTML to markdown)"

[[phases.steps]]
id = "4.4"
description = "Generate PDF of current page"

[[phases.steps]]
id = "4.5"
description = "Download files triggered by interactions"

[[phases.steps]]
id = "4.6"
description = "Extract structured data (tables, lists, metadata)"

# ============================================================================
# Phase 5: Validate
# ============================================================================

[[phases]]
id = "validate"

[[phases.steps]]
id = "5.1"
description = "Check browser console for errors"
blocker = true

[[phases.steps]]
id = "5.2"
description = "Verify expected elements are present on page"

[[phases.steps]]
id = "5.3"
description = "Compare screenshots against expected baselines"

[[phases.steps]]
id = "5.4"
description = "Validate scraped data matches expected format"

[[phases.steps]]
id = "5.5"
description = "Check network requests for failed API calls"

[[phases.steps]]
id = "5.6"
description = "Verify no critical JavaScript errors"
blocker = true

[[phases.steps]]
id = "5.7"
description = "Confirm test assertions pass"
blocker = true

# ============================================================================
# Phase 6: Cleanup
# ============================================================================

[[phases]]
id = "cleanup"

[[phases.steps]]
id = "6.1"
description = "Save all captured artifacts to local storage"

[[phases.steps]]
id = "6.2"
description = "Release Browserbase browser session"

[[phases.steps]]
id = "6.3"
description = "Verify session was released (no orphan sessions)"

[[phases.steps]]
id = "6.4"
description = "Generate test results summary"

[[phases.steps]]
id = "6.5"
description = "Report results to calling workflow"

[[phases.steps]]
id = "6.6"
description = "Log session duration and step outcomes to metrics"
