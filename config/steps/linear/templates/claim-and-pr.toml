# Template: claim-and-pr
#
# The most common multi-step recipe in the linear skill — pick up an
# issue, claim it, implement a change in a worktree, run baseline +
# post-impl tests, run Codex review, open a draft PR. Stops at L3
# (PR creation). Does NOT include L4 (CI + CodeRabbit), L5 (merge),
# Phase 3.5 (QA handoff), or Phase 4 (cleanup) — those run separately
# once the human reviewer engages with the PR.
#
# Why stop at L3: opening a draft PR is the natural "I've done my
# part, others now" handoff point. CI fires automatically; CodeRabbit
# reviews automatically; the human reviewer comments and the
# remaining layers fire when they engage. Bundling them into the
# claim-and-pr template would force the agent to babysit a 30+
# minute CI/review wait, which is the worst part of the workflow
# for the agent to own.

[template]
id = "claim-and-pr"
name = "Claim and open PR"
description = """
Pick up a Linear issue (claim guards + In Progress + assign self),
fetch context, run intelligence transforms, create worktree with
test baseline, implement, run post-impl tests + self-review + Codex
review, push branch, open draft PR with `Ref FPCRM-XXX`. Stop there.
"""
triggers = [
    "claim and pr",
    "claim and open pr",
    "pick up issue and open pr",
    "claim FPCRM-",         # prefix-match — router substitutes the actual ticket ID
    "draft pr for FPCRM-",
]
estimate_minutes = 45
catalog = "default"

# ─── Phase -0 + 0: claim ────────────────────────────────────────────
[[template.steps]]
ref = "linear.claim.-0.1"
[[template.steps]]
ref = "linear.claim.-0.2"
[[template.steps]]
ref = "linear.claim.-0.3"
[[template.steps]]
ref = "linear.claim.-0.4"
[[template.steps]]
ref = "linear.claim.0.1"
[[template.steps]]
ref = "linear.claim.0.2"
[[template.steps]]
ref = "linear.claim.0.3"
[[template.steps]]
ref = "linear.claim.0.4"

# ─── Phase 1: fetch ─────────────────────────────────────────────────
[[template.steps]]
