# ============================================================================

[[phases]]
id = "clean"

[[phases.steps]]
id = "2.1"
description = "Remove orphaned documentation files"

[[phases.steps]]
id = "2.2"
description = "Archive outdated content"

[[phases.steps]]
id = "2.3"
description = "Fix broken internal links"

[[phases.steps]]
id = "2.4"
description = "Remove duplicate documentation"

[[phases.steps]]
id = "2.5"
description = "Update incorrect code references"

