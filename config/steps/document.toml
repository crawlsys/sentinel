# ============================================================================

[[phases]]
id = "audit"

[[phases.steps]]
id = "1.1"
description = "Scan for existing documentation files"

[[phases.steps]]
id = "1.2"
description = "Find orphaned docs (no matching code)"

[[phases.steps]]
id = "1.3"
description = "Check for stale content (outdated references)"

[[phases.steps]]
id = "1.4"
description = "Inventory all doc types (README, API, inline, arch)"

[[phases.steps]]
id = "1.5"
description = "Identify undocumented public APIs"

