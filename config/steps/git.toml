# Git Skill — Step Definitions
# 17 individually trackable steps across 6 phases (2 workflows)
#
# Workflow 1 (commit): analyze → generate → execute
# Workflow 2 (PR): pr-gather → pr-generate → pr-create

# ============================================================================
# Workflow 1, Phase 1: Analyze — Assess current git state
# ============================================================================

[[phases]]
id = "analyze"

[[phases.steps]]
id = "1.1"
description = "Check current branch and working tree status"

[[phases.steps]]
id = "1.2"
description = "Detect staged and unstaged changes"

[[phases.steps]]
id = "1.3"
description = "Load recent commit style reference"

[[phases.steps]]
id = "1.4"
description = "Create feature branch if on main"

# ============================================================================
# Workflow 1, Phase 2: Generate — Create commit message
# ============================================================================

[[phases]]
id = "generate"

[[phases.steps]]
id = "2.1"
description = "Determine conventional commit type and scope"

[[phases.steps]]
id = "2.2"
description = "Generate commit message body"

# ============================================================================
# Workflow 1, Phase 3: Execute — Stage, commit, verify
# ============================================================================

[[phases]]
id = "execute"

[[phases.steps]]
id = "3.1"
description = "Stage relevant files"

[[phases.steps]]
id = "3.2"
description = "Create commit with conventional message"
blocker = true

[[phases.steps]]
id = "3.3"
description = "Verify commit exists in log"

# ============================================================================
# Workflow 2, Phase 4: PR Gather — Collect PR context
# ============================================================================

[[phases]]
id = "pr-gather"

[[phases.steps]]
id = "4.1"
description = "Get current branch name"

[[phases.steps]]
id = "4.2"
description = "List commits since divergence from main"

[[phases.steps]]
id = "4.3"
description = "Get files changed stat"

# ============================================================================
# Workflow 2, Phase 5: PR Generate — Create PR description
# ============================================================================

[[phases]]
id = "pr-generate"

[[phases.steps]]
id = "5.1"
description = "Generate PR summary and changes list"

[[phases.steps]]
id = "5.2"
description = "Generate test plan checklist"

# ============================================================================
# Workflow 2, Phase 6: PR Create — Push and create PR
# ============================================================================

[[phases]]
id = "pr-create"

[[phases.steps]]
id = "6.1"
description = "Push branch to remote with -u flag"

[[phases.steps]]
id = "6.2"
description = "Create PR via gh pr create"
blocker = true

[[phases.steps]]
id = "6.3"
description = "Report PR URL"
