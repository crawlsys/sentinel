# Debug Skill — Step Definitions
# 28 individually trackable steps across 5 phases
#
# Phases: reproduce → isolate → investigate → fix → verify-prevent

# ============================================================================
# Phase 1: Reproduce
# ============================================================================

[[phases]]
id = "reproduce"

[[phases.steps]]
id = "1.1"
description = "Gather error info (logs, stack traces, screenshots)"

[[phases.steps]]
id = "1.2"
description = "Identify triggers and preconditions"

[[phases.steps]]
id = "1.3"
description = "Run reproduction steps"

[[phases.steps]]
id = "1.4"
description = "Confirm consistent reproducibility"

[[phases.steps]]
id = "1.5"
description = "Document reproduction steps"

[[phases.steps]]
id = "1.6"
description = "Reproducible or documented as intermittent"
blocker = true

# ============================================================================
# Phase 2: Isolate
# ============================================================================

[[phases]]
id = "isolate"

[[phases.steps]]
id = "2.1"
description = "Trace code path from error origin"

[[phases.steps]]
id = "2.2"
description = "Check recent changes (git log/blame)"

[[phases.steps]]
id = "2.3"
description = "Analyze stack trace and call chain"

[[phases.steps]]
id = "2.4"
description = "Narrow to specific component or module"

[[phases.steps]]
id = "2.5"
description = "Identify related code and side effects"

# ============================================================================
# Phase 3: Investigate
# ============================================================================

[[phases]]
id = "investigate"

[[phases.steps]]
id = "3.1"
description = "Spawn investigation agents for parallel analysis"

[[phases.steps]]
id = "3.2"
description = "Correlate findings across code paths"

[[phases.steps]]
id = "3.3"
description = "Form hypothesis for root cause"

[[phases.steps]]
id = "3.4"
description = "Validate hypothesis with code evidence"

[[phases.steps]]
id = "3.5"
description = "Identify root cause"
blocker = true

[[phases.steps]]
id = "3.6"
description = "Document root cause analysis"

# ============================================================================
# Phase 4: Fix
# ============================================================================

[[phases]]
id = "fix"

[[phases.steps]]
id = "4.1"
description = "Design minimal fix targeting root cause"

[[phases.steps]]
id = "4.2"
description = "Implement fix"

[[phases.steps]]
id = "4.3"
description = "Verify no side effects on adjacent code"

[[phases.steps]]
id = "4.4"
description = "Handle edge cases identified during investigation"

[[phases.steps]]
id = "4.5"
description = "Commit fix with descriptive message"

# ============================================================================
# Phase 5: Verify & Prevent
# ============================================================================

[[phases]]
id = "verify-prevent"

[[phases.steps]]
id = "5.1"
description = "Run reproduction steps (confirm fixed)"
blocker = true

[[phases.steps]]
id = "5.2"
description = "Run full test suite"

[[phases.steps]]
id = "5.3"
description = "Check for regressions in related code"

[[phases.steps]]
id = "5.4"
description = "Add regression test for the bug"

[[phases.steps]]
id = "5.5"
description = "Commit regression test"

[[phases.steps]]
id = "5.6"
description = "No regressions confirmed"
blocker = true
