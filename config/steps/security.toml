# Security Skill — Step Definitions
# 20 individually trackable steps across 4 phases
#
# Phases: scope → scan → consolidate → report
# NOTE: Scan phase launches 5 parallel agents (injection, auth, access, deps, secrets)
# This matches the SKILL.md parallel agent model

# ============================================================================
# Phase 1: Scope — Identify attack surface
# ============================================================================

[[phases]]
id = "scope"

[[phases.steps]]
id = "1.1"
description = "Identify attack surface and entry points"

[[phases.steps]]
id = "1.2"
description = "List all user input vectors"

[[phases.steps]]
id = "1.3"
description = "Detect technologies and frameworks in use"

[[phases.steps]]
id = "1.4"
description = "Map authentication and authorization flows"

[[phases.steps]]
id = "1.5"
description = "Identify data storage and transmission points"

# ============================================================================
# Phase 2: Scan — Launch 5 parallel security agents
# ============================================================================

[[phases]]
id = "scan"

[[phases.steps]]
id = "2.1"
description = "Launch injection scanner agent (SQL, XSS, command)"

[[phases.steps]]
id = "2.2"
description = "Launch authentication auditor agent"

[[phases.steps]]
id = "2.3"
description = "Launch access control checker agent (IDOR, RBAC)"

[[phases.steps]]
id = "2.4"
description = "Launch dependency auditor agent (CVEs)"

[[phases.steps]]
id = "2.5"
description = "Launch secrets scanner agent"

[[phases.steps]]
id = "2.6"
description = "Collect results from all agents"

# ============================================================================
# Phase 3: Consolidate — Verify, classify, prioritize
# ============================================================================

[[phases]]
id = "consolidate"

[[phases.steps]]
id = "3.1"
description = "Verify each finding with code evidence"

[[phases.steps]]
id = "3.2"
description = "Eliminate false positives"

[[phases.steps]]
id = "3.3"
description = "Classify findings by CVSS severity"

[[phases.steps]]
id = "3.4"
description = "All findings verified or dismissed"
blocker = true

# ============================================================================
# Phase 4: Report — Assessment and tracking
# ============================================================================

[[phases]]
id = "report"

[[phases.steps]]
id = "4.1"
description = "Create security assessment report"

[[phases.steps]]
id = "4.2"
description = "Track findings as todos with severity tags"

[[phases.steps]]
id = "4.3"
description = "Recommend preventive measures"

[[phases.steps]]
id = "4.4"
description = "Document security posture summary"
