# Security Skill — Step Definitions
# 30 individually trackable steps across 5 phases
#
# Phases: scope → scan → analyze → remediate → report

# ============================================================================
# Phase 1: Scope
# ============================================================================

[[phases]]
id = "scope"

[[phases.steps]]
id = "1.1"
description = "Identify attack surface and entry points"

[[phases.steps]]
id = "1.2"
description = "List all user input vectors"

[[phases.steps]]
id = "1.3"
description = "Detect technologies and frameworks in use"

[[phases.steps]]
id = "1.4"
description = "Check dependency tree for known vulnerabilities"

[[phases.steps]]
id = "1.5"
description = "Map authentication and authorization flows"

[[phases.steps]]
id = "1.6"
description = "Identify data storage and transmission points"

# ============================================================================
# Phase 2: Scan
# ============================================================================

[[phases]]
id = "scan"

[[phases.steps]]
id = "2.1"
description = "Check for SQL/NoSQL injection vulnerabilities"

[[phases.steps]]
id = "2.2"
description = "Check for XSS vulnerabilities"

[[phases.steps]]
id = "2.3"
description = "Check for CSRF vulnerabilities"

[[phases.steps]]
id = "2.4"
description = "Audit authentication flows for weaknesses"

[[phases.steps]]
id = "2.5"
description = "Check for secrets exposure (env vars, hardcoded keys)"

[[phases.steps]]
id = "2.6"
description = "Scan for insecure deserialization"

[[phases.steps]]
id = "2.7"
description = "Check for broken access control patterns"

[[phases.steps]]
id = "2.8"
description = "Audit API endpoints for missing auth checks"

# ============================================================================
# Phase 3: Analyze
# ============================================================================

[[phases]]
id = "analyze"

[[phases.steps]]
id = "3.1"
description = "Classify findings by CVSS severity"

[[phases.steps]]
id = "3.2"
description = "Verify each finding with code evidence"

[[phases.steps]]
id = "3.3"
description = "Eliminate false positives"

[[phases.steps]]
id = "3.4"
description = "Assess exploitability of each finding"

[[phases.steps]]
id = "3.5"
description = "All findings verified or dismissed"
blocker = true

# ============================================================================
# Phase 4: Remediate
# ============================================================================

[[phases]]
id = "remediate"

[[phases.steps]]
id = "4.1"
description = "Fix critical severity vulnerabilities"

[[phases.steps]]
id = "4.2"
description = "Fix high severity vulnerabilities"

[[phases.steps]]
id = "4.3"
description = "Update vulnerable dependencies"

[[phases.steps]]
id = "4.4"
description = "Add input validation and sanitization"

[[phases.steps]]
id = "4.5"
description = "Commit security fixes"

# ============================================================================
# Phase 5: Report
# ============================================================================

[[phases]]
id = "report"

[[phases.steps]]
id = "5.1"
description = "Create security assessment report"

[[phases.steps]]
id = "5.2"
description = "Track findings as todos with severity tags"

[[phases.steps]]
id = "5.3"
description = "Recommend preventive measures"

[[phases.steps]]
id = "5.4"
description = "Document security posture summary"
