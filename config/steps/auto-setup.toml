# Auto-Setup Skill — Step Definitions
# System scanning, marketplace installation, and validation
#
# 3 phases, ~8 steps

# ============================================================================
# Phase 1: Detect — Scan system state
# ============================================================================

[[phases]]
id = "detect"

[[phases.steps]]
id = "1.1"
description = "Scan system for existing Claude Code installation"

[[phases.steps]]
id = "1.2"
description = "Identify OS and platform specifics"

[[phases.steps]]
id = "1.3"
description = "Check existing skill/hook/MCP installations"

# ============================================================================
# Phase 2: Install — Set up marketplace components
# ============================================================================

[[phases]]
id = "install"

[[phases.steps]]
id = "2.1"
description = "Install skills to ~/.claude/skills/"

[[phases.steps]]
id = "2.2"
description = "Configure hooks in settings.json"

[[phases.steps]]
id = "2.3"
description = "Set up MCP servers in .claude.json"

# ============================================================================
# Phase 3: Verify — Validate installation
# ============================================================================

[[phases]]
id = "verify"

[[phases.steps]]
id = "3.1"
description = "Validate all skills load correctly"
blocker = true

[[phases.steps]]
id = "3.2"
description = "Check hook registrations are active"
blocker = true

[[phases.steps]]
id = "3.3"
description = "Confirm MCP servers respond to health checks"
blocker = true
