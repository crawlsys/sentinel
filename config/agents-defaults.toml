# ---------------------------------------------------------------------------
# Ollama Cloud — Kimi K2.6 (budget coder + budget auditor)
#
# Vendor = Ollama so DifferentVendorFrom(Anthropic) qualifies for A3's
# auditor seat. ReversibilityClass capped at Irreversible — operator
# can lift to Catastrophic in overrides if they trust Kimi's judgment
# for catastrophic actions.
# ---------------------------------------------------------------------------
[[agent]]
agent_id = "kimi-k2-6-ollama-cloud"
display_name = "Kimi K2.6 (Ollama Cloud)"
vendor = "Ollama"
model_id = "kimi-k2.6"
declared = [
    { Reasoning = "standard" },
    { ToolUse = ["Read", "Glob", "Grep", "Edit", "Write", "Bash"] },
    { StructuredOutput = "AuditorVerdict" },
    { StructuredOutput = "AnyJson" },
    { LatencyBudget = 30000 },
    { CostBudget = 0.05 },
    { ReversibilityClass = "Irreversible" },
]
cost_per_input_token = 0.000001
cost_per_output_token = 0.000005
typical_latency_ms = 15000
max_context_tokens = 128000
data_zones = []

# ---------------------------------------------------------------------------
# OpenAI — GPT 5.5 (deep-reasoning alt-vendor)
#
# Useful as A3 auditor when acting agent is Claude (DifferentVendorFrom
# Anthropic qualifies). Lower cost than Opus, faster.
# ---------------------------------------------------------------------------
[[agent]]
agent_id = "openai-gpt-5-5"
display_name = "GPT 5.5"
vendor = "Openai"
model_id = "gpt-5.5"
declared = [
    { Reasoning = "deep" },
    { ToolUse = ["Read", "Glob", "Grep", "Edit", "Write", "Bash"] },
    { StructuredOutput = "AuditorVerdict" },
    { StructuredOutput = "BaCritique" },
    { StructuredOutput = "AnyJson" },
    { LatencyBudget = 20000 },
    { CostBudget = 0.30 },
    { ReversibilityClass = "Catastrophic" },
]
cost_per_input_token = 0.000005
cost_per_output_token = 0.000020
typical_latency_ms = 4000
max_context_tokens = 256000
data_zones = ["UsEast"]
