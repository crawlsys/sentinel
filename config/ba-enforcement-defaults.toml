# Sentinel BA1+3 enforcement mode тАФ shipped defaults.
#
# Read by `sentinel_infrastructure::ba_config::BaEnforcementConfig` at
# sentinel startup via `include_str!`. Operators override these in
# `~/.claude/sentinel/config/ba-enforcement.toml`; the loader merges
# operator overrides on top.
#
# Enterprise production baseline is `DefaultBlocking`: structural BA
# enforcement blocks by default instead of silently logging would-be
# violations. Operators may explicitly choose `ObserveOnly` only for
# local diagnostics. For catastrophic-class output tools (board decks,
# signed customer briefs, regulatory filings), use `StrictBlocking`.
#
# Mode values: ObserveOnly | DefaultBlocking | StrictBlocking.
#
# - `ObserveOnly`: hook runs every check + logs would-be blocks via
#   `tracing::warn` but never returns `deny()`. Diagnostics only.
# - `DefaultBlocking`: hook blocks on the structural-violation
#   findings (`Existence` for both hooks; `Coverage` for BA3) and
#   warns on the rest. Enterprise production default.
# - `StrictBlocking`: hook also blocks on `Freshness` (provenance) +
#   `WithinSession` (provenance) + `Hash` (requirements). Used for
#   catastrophic-class outputs where stale citations or
#   recently-edited requirements are operator-stop-ship signals.

[provenance_validate]
mode = "DefaultBlocking"

[requirements_traceability_gate]
mode = "DefaultBlocking"
