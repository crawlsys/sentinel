# Skill Workflow Definitions
#
# Each workflow defines ordered phases with judge model assignments.
# Phases are executed sequentially — each must produce evidence
# that is verified by the assigned judge before advancing.
#
# Tiers:
#   0 = Reference only (no workflow): skill-registry, skill-router, web-design, mui,
#       react, nextjs, atomic-design, ddd-hexagonal, claude-code-guide, claude-md,
#       react-hooks-linter
#   1 = Simple (2-3 phases): 15 skills
#   2 = Moderate (4-5 phases): 18 skills
#   3 = Complex (6-8 phases): 12 skills

# ==============================================================================
# TIER 3 — Complex Workflows (6-8 phases)
# ==============================================================================

# --- linear (8 phases) ---
[[workflows]]
skill = "linear"

[[workflows.phases]]
id = "claim"
file = "claim.md"
required = true
judge = "sonnet"
description = "Claim the Linear issue, assign to self, move to In Progress"

[[workflows.phases]]
