file = "worktree.md"
required = true
judge = "sonnet"
description = "Create git worktree for isolated development"

[[workflows.phases]]
id = "review"
file = "review.md"
required = true
judge = "opus"
description = "Code review — multi-layer pipeline including Codex"

[[workflows.phases]]
id = "qa-handoff"
file = "qa-handoff.md"
