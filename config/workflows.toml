# Skill Workflow Definitions
#
# Each workflow defines ordered phases with judge model assignments.
# Phases are executed sequentially — each must produce evidence
# that is verified by the assigned judge before advancing.

[[workflows]]
skill = "linear"

[[workflows.phases]]
id = "claim"
file = "claim.md"
required = true
judge = "sonnet"
description = "Claim the Linear issue, assign to self, move to In Progress"

[[workflows.phases]]
id = "fetch"
file = "fetch.md"
required = true
judge = "sonnet"
description = "Fetch full issue details, comments, attachments, linked issues"

[[workflows.phases]]
id = "intelligence"
file = "intelligence.md"
required = true
judge = "sonnet"
description = "Research codebase, understand context, identify affected areas"

[[workflows.phases]]
id = "plan-doc"
file = "plan-doc.md"
required = true
judge = "sonnet"
description = "Write implementation plan document, get approval"

[[workflows.phases]]
id = "worktree"
file = "worktree.md"
required = true
judge = "sonnet"
description = "Create git worktree for isolated development"

[[workflows.phases]]
id = "review"
file = "review.md"
required = true
judge = "opus"
description = "Code review — multi-layer pipeline including Codex"

[[workflows.phases]]
id = "qa-handoff"
file = "qa-handoff.md"
required = true
judge = "opus"
description = "QA testing on staging, Steel smoke test"

[[workflows.phases]]
id = "cleanup"
file = "cleanup.md"
required = false
judge = "sonnet"
description = "Remove worktree, update Linear status, close PR"
