# Compose override that wires sentinel-viz into the sentinel-sandbox
# stack (infra/sandbox/docker-compose.yml). Apply with:
#
#   cd infra/sandbox
#   docker compose -f docker-compose.yml \
#                  -f ../../tools/sandbox/sandbox-compose-override.yml \
#                  up -d sandbox-dev
#
# Or for the long-running container the operator already has up,
# add the equivalent mounts to the base compose file and
# `docker compose up -d --force-recreate sandbox-dev`.
#
# See tools/sandbox/COMPOSE-INTEGRATION.md for the why; this is the
# what.

services:

  sandbox-dev:
    # Linux needs the host-gateway alias explicit so curl /
    # host.docker.internal resolves the host's loopback. The
    # in-container claude / scripts can hit the host's viz-api
    # at http://host.docker.internal:8082.
    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      # 1. Sentinel hook output crosses up to the host bridge.
      #    Container writes to $SENTINEL_CLAUDE_DIR/sentinel/metrics/
      #    (set in the base compose to /workspace/.container-state/claude/...).
      #    This bind makes that path the SAME inode as the host's
      #    ~/.claude/sentinel/metrics/ which the host bridge
      #    (sentinel-bridge --tail) already monitors.
      - ${HOME}/.claude/sentinel/metrics:/workspace/.container-state/claude/sentinel/metrics

      # 2. Claude settings.json with the canonical sentinel hooks
      #    profile so every PreToolUse / PostToolUse / etc. fires
      #    `sentinel hook --event …`. Sourced from the versioned
      #    repo so the file travels with the bridge.
      - ${SENTINEL_REPO:-../..}/tools/sandbox/claude-settings-hooked.json:/workspace/.container-state/claude/settings.json:ro

      # 3. Sibling legatus-consul-agent repo. sentinel-legatus
      #    path-depends on consul-protocol + consul-domain crates
      #    living here. With the operator_id fix on
      #    feat/sentinel-viz, the latest legatus-consul-agent main
      #    builds cleanly — no need to pin to f0a07bb anymore.
      - ${HOME}/firefly/legatus-consul-agent:/workspace/legatus-consul-agent:rw

      # 4. The bootstrap script that installs sentinel binary on
      #    first run (if not already cached in the state volume).
      - ${SENTINEL_REPO:-../..}/tools/sandbox/sandbox-bootstrap.sh:/usr/local/bin/sandbox-bootstrap.sh:ro

    # Run the bootstrap once at container start to install sentinel
    # binary if missing, then drop back into the original sleep
    # infinity. The bootstrap is idempotent — subsequent restarts
    # are instant.
    command:
      - bash
      - -lc
      - |
        /usr/local/bin/sandbox-bootstrap.sh
        exec sleep infinity
